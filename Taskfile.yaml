version: "3"
vars:
  DPRINT_VERSION: 0.48.0

tasks:
  install:
    cmds:
      - curl -fsSL https://dprint.dev/install.sh | sh -s {{ .DPRINT_VERSION }}
      - mkdir -p .bin && cp $HOME/.dprint/bin/dprint .bin/dprint # workaround for local install
      - curl -fsSL https://get.pnpm.io/install.sh | sh - &&   source ~/.bashrc

  fmt:
    desc: Run format
    cmds:
      - ${PWD}/.bin/dprint fmt

  fmt:check:
    desc: Check format
    cmds:
      - ${PWD}/.bin/dprint check

  scratch:init:
    - git config --global url."https://github.com/mitmedialab/prg-raise-playground-scratch-gui.git".insteadOf "git@github.com:mitmedialab/prg-raise-playground-scratch-gui.git"
    - git config --global url."https://github.com/mitmedialab/prg-raise-playground-scratch-vm.git".insteadOf "git@github.com:mitmedialab/prg-raise-playground-scratch-vm.git"
    - git clone --recurse-submodules  https://github.com/mitmedialab/prg-raise-playground.git
    - cd prg-raise-playground && git switch dev &&  pnpm install
    # copy the extension to the rigth place
    - ln -s $PWD/scratch-prg-extensions/extensions/src/arduino_basics $PWD/prg-raise-playground/extensions/src/arduino_basics
    - cd scratch-prg-extensions/extensions/src/arduino_basics && pnpm install
    - ln -s $PWD/scratch-prg-extensions/extensions/src/arduino_modulino $PWD/prg-raise-playground/extensions/src/arduino_modulino
    - cd scratch-prg-extensions/extensions/src/arduino_modulino && pnpm install
    - ln -s $PWD/scratch-prg-extensions/extensions/src/arduino_modulino_pixels $PWD/prg-raise-playground/extensions/src/arduino_modulino_pixels
    - cd scratch-prg-extensions/extensions/src/arduino_modulino_pixels && pnpm install

  board:upload:
    desc: "Build, Upload, and start the app into the board"
    cmds:
      - task app:build
      - |
          ZIP_FILE=$(ls -t app/.build/scratch-arduino-app-*.zip 2>/dev/null | head -n1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found in app/.build. Run 'task app:build' first."
            exit 1
          fi
          adb shell "rm -rf /home/arduino/ArduinoApps/scratch-arduino-app*"
          adb push "$ZIP_FILE" /tmp
          ZIP_BASENAME=$(basename "$ZIP_FILE")
          adb shell "arduino-app-cli app import /tmp/$ZIP_BASENAME"
      - adb shell "arduino-app-cli app stop user:scratch-arduino-app"
      - adb shell "arduino-app-cli app start user:scratch-arduino-app"

  app:build:
    desc: "build the assets of prg-raise-playground and build the zip of the app"
    vars:
      APP_VERSION:
        sh: echo "${APP_VERSION:-$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')}"
    cmds:
      - cd prg-raise-playground && CI=true pnpm build && cp -r build/. ../app/assets
      - echo "Creating zip with version {{.APP_VERSION}}"
      - mkdir -p app/.build && rm -f app/.build/*.zip
      - mkdir -p tmp_zip/scratch-arduino-app
      - cp -r app/* tmp_zip/scratch-arduino-app/
      - cd tmp_zip && zip -r ../app/.build/scratch-arduino-app-{{.APP_VERSION}}.zip scratch-arduino-app && cd ..
      - rm -rf tmp_zip

  release:
    desc: Create a tag on the current commit and push it to the remote to create the release
    cmds:
      - |
          if [ -z "{{.CLI_ARGS}}" ]; then
            echo "Error: Version argument is required. Usage: task orchestrator:trigger:release -- <version>"
            exit 1
          fi
      - git tag -a "{{.CLI_ARGS}}" -m "Release {{.CLI_ARGS}}"
      - git push origin "{{.CLI_ARGS}}"

  watch:
    desc: "watch files changes for both python and sketch, and upload the changes to the board and restart"
    deps:
      - python:watch
      - sketch:watch
      - scratch:watch

  scratch:watch:
    cmds:
      - cd prg-raise-playground && pnpm dev -i arduino_basics arduino_modulino arduino_modulino_pixels

  python:watch:
    desc: "Watch Python folder for changes and auto-upload/restart"
    silent: true
    cmds:
      - |
          while true; do
            echo "🐍 Waiting for changes in python folder..."
            inotifywait -r -e modify,create,delete,move app/python/ 2>/dev/null || {
              echo "inotifywait failed, retrying..."
              sleep 2
              continue
            }

            sleep 1 # Waiting 1 second for file writes to complete..."
            echo "🐍  Change detected: uploading and restarting service..."
            task python:upload-and-restart || {
              echo "Upload/restart failed, continuing to watch..."
              continue
            }
          done

  python:upload-and-restart:
    desc: "Upload Python files and restart container"
    silent: true
    cmds:
      - |
          adb push app/python/ /home/arduino/ArduinoApps/scratch-arduino-app/

          CONTAINER_ID=$(adb shell "docker ps -q --filter 'label=cc.arduino.app.main=true'")
          if [ -n "$CONTAINER_ID" ]; then
            /usr/bin/time -f "🐍 Restarted in %es" adb shell "docker restart $CONTAINER_ID"
          else
            echo "[warning] No running container found with label cc.arduino.app.main=true to restart"
          fi

  sketch:watch:
    desc: "Watch sketch folder for changes and auto-compile/upload"
    silent: true
    cmds:
      - |
          while true; do
            echo "♾️  Waiting for changes in sketch folder..."
            inotifywait -r -e modify,create,delete app/sketch/ --include '\.(ino|cpp|h|c)$' 2>/dev/null || {
              echo "inotifywait failed, retrying..."
              sleep 2
              continue
            }

            sleep 1   # Waiting 1 second for file writes to complete
            echo "♾️  Change detected: compiling and uploading..."
            task sketch:compile-and-upload|| {
              echo "Compile/upload failed, continuing to watch..."
              continue
            }
            echo
          done

  sketch:compile-and-upload:
    desc: "Compile and upload Arduino sketch"
    silent: true
    cmds:
      - |
          TOTAL_START=$(date +%s)
          /usr/bin/time -f "♾️  Compiled in %es" arduino-cli compile  --build-path .cache -b arduino:zephyr:unoq app/sketch/
          /usr/bin/time -f "♾️  Uploaded in %es" arduino-cli upload -p /dev/ttyACM0 -b arduino:zephyr:unoq:flash_mode=ram --input-dir .cache  app/sketch/
          TOTAL_END=$(date +%s)
          echo "♾️  Total time: $((TOTAL_END - TOTAL_START))s"
      # even if not necessary: the sketch folder is sync into the board to have the updated version
      - adb push app/sketch/ /home/arduino/ArduinoApps/scratch-arduino-app/

  sketch:monitor:
    desc: "Open serial monitor for Arduino debugging"
    silent: true
    cmds:
      - echo " ♾️  Opening serial monitor (Press Ctrl+C to exit)..."
      - arduino-cli monitor -p /dev/ttyACM0

  python:monitor:
    desc: "Watch Python folder for changes and auto-upload/restart"
    cmds:
      - |
          echo "🐍 Python container logs"
          while true; do
           CONTAINER_ID=$(adb shell "docker ps -q --filter 'label=cc.arduino.app.main=true'")
           if [ -n "$CONTAINER_ID" ]; then
             adb shell "docker logs -f $CONTAINER_ID"
           else
             echo "[warning] No running container found with label cc.arduino.app.main=true"
           fi
           done
